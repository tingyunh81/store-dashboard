<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>門市結帳分析儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--bg2:#171923;--bg3:#1e2230;--bg4:#252840;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--text:#e8eaf0;--text2:#8b90a8;--text3:#555970;--accent:#6c8ef7;--accent3:#34d399;--warn:#f59e0b;--danger:#f87171;--r:10px;--rl:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px;min-height:100vh}
.header{padding:18px 28px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:17px;font-weight:700;letter-spacing:.02em}
.header p{font-size:12px;color:var(--text2);margin-top:3px;font-family:'DM Mono',monospace}
.badge{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--accent);font-family:'DM Mono',monospace}
.main{padding:18px 28px;display:flex;flex-direction:column;gap:16px}
.filter-bar{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.pr{display:flex;gap:5px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif;white-space:nowrap}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.pill.wo{border-color:transparent;color:#fff;font-weight:500}
.pill.wknd{color:#f87171;border-color:rgba(248,113,113,.35)}
.pill.wknd:hover{border-color:#f87171}
.pill.wknd.wo{background:#f87171}
.date-range{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-range input[type="date"]{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:5px 10px;font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;outline:none}
.date-range input[type="date"]:focus{border-color:var(--accent)}
.date-range span{color:var(--text3);font-size:12px}
.date-range button{padding:5px 14px;border-radius:8px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.date-range button:hover{background:var(--accent);color:#fff}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr)}}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px}
.metric-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.metric-value{font-size:23px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.metric-sub{font-size:11px;color:var(--text2);margin-top:4px}
.metric-value.ac{color:var(--accent)}.metric-value.gr{color:var(--accent3)}.metric-value.wa{color:var(--warn)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.ch{padding:13px 18px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.cb{padding:14px 18px;overflow-x:auto}
.ht{border-collapse:collapse;min-width:680px;width:100%}
.ht th{padding:5px 7px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
.ht th.sth{text-align:left;min-width:94px}
.ht td{padding:4px 3px;text-align:center;font-size:12px;font-family:'DM Mono',monospace}
.ht td.std{text-align:left;padding:4px 8px;font-weight:700;font-size:12px;font-family:'Noto Sans TC',sans-serif;white-space:nowrap}
.ht tr.dr{border-bottom:1px solid var(--border)}
.ht tr.dr:last-child{border-bottom:none}
.ht tr.tr td{border-top:1px solid var(--border2);padding-top:7px;color:var(--text2);font-weight:500;font-size:12px}
.cv{display:inline-block;min-width:26px;padding:3px 3px;border-radius:4px;line-height:1.2}
.crt{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:700px){.crt{grid-template-columns:1fr}}
.cw{position:relative;height:210px}
.dt{border-collapse:collapse;width:100%;min-width:680px;font-size:12px}
.dt th{padding:5px 7px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border2);text-align:center;white-space:nowrap}
.dt th:first-child,.dt th:nth-child(2){text-align:left}
.dt td{padding:4px 7px;text-align:center;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace}
.dt td:first-child{text-align:left;color:var(--text2)}
.dt td:nth-child(2){text-align:center}
.dt td.z{color:var(--text3)}
.dt tr.wk td{background:rgba(248,113,113,.04)}
.dt tr.wk td:first-child{color:rgba(248,113,113,.7)}
.dt tr.ttr td{border-top:1px solid var(--border2);border-bottom:none;color:var(--text2);font-weight:500;padding-top:7px}
.wb{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-family:'Noto Sans TC',sans-serif}
.wb.wk{background:rgba(248,113,113,.15);color:#f87171}.wb.wd{background:rgba(108,142,247,.12);color:var(--accent)}
select.ds{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:5px 10px;font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;outline:none}
.footer{padding:14px 28px;border-top:1px solid var(--border);text-align:center;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
</style>
</head>

  <span class="badge" id="periodBadge"></span>
</div>
<div class="main">

    <div class="fg"><div class="fl">日期區間</div><div class="date-range"><input type="date" id="dateFrom" value="2026-03-01"><span>～</span><input type="date" id="dateTo" value="2026-03-22"><button onclick="applyDateRange()">套用</button><button onclick="resetDateRange()" style="border-color:var(--text3);color:var(--text3)">重設</button></div></div>

  <div class="metrics" id="metrics"></div>

  <div class="crt">

    <div class="card"><div class="ch"><span class="ct">各門市佔比</span></div><div class="cb"><div class="cw"><canvas id="pieChart"></canvas></div></div></div>

</div>
<div class="footer">資料期間：<span id="fPeriod"></span> · 共 <span id="fTotal"></span> 筆唯一訂單</div>

function rm(){const rows=fd();const ht=ght(rows);const total=ht.reduce((a,b)=>a+b,0);const pi=ht.indexOf(Math.max(...ht));const peakH=HOURS[pi],peakV=ht[pi];const busy=ht.map((v,i)=>({v,h:HOURS[i]})).filter(x=>x.v>=peakV*.7);const bb=busy.length?`${busy[0].h}:00 ─ ${busy[busy.length-1].h}:59`:'—';const wdStr=selWd.has('all')?'全週':[...selWd].sort().map(w=>'週'+WD[+w]).join('、');document.getElementById('metrics').innerHTML=`<div class="metric"><div class="metric-label">結帳筆數</div><div class="metric-value ac">${total.toLocaleString()}</div><div class="metric-sub">${dateFrom} ～ ${dateTo}</div></div><div class="metric"><div class="metric-label">尖峰時段</div><div class="metric-value gr">${peakH}:00</div><div class="metric-sub">${peakV} 筆</div></div><div class="metric"><div class="metric-label">忙碌時段帶</div><div class="metric-value wa" style="font-size:13px">${bb}</div><div class="metric-sub">≥ 尖峰 70%</div></div><div class="metric"><div class="metric-label">${curStore==='all'?'篩選條件':'當前門市'}</div><div class="metric-value" style="font-size:14px">${curStore==='all'?'全部門市':curStore}</div><div class="metric-sub">${wdStr}</div></div>`;}

function rh(){const rows=fd(),sts=gas();const allD=sts.map(st=>gsht(st,rows));const mx=Math.max(...allD.flat(),1);const wdStr=selWd.has('all')?'全週':[...selWd].sort().map(w=>'週'+WD[+w]).join('、');document.getElementById('heatSub').textContent=wdStr+' 合計 · '+dateFrom+'～'+dateTo;let h=`<thead><tr><th class="sth">門市</th>${HOURS.map(h=>`<th>${h}:00</th>`).join('')}<th>合計</th></tr></thead><tbody>`;sts.forEach((st,i)=>{const rd=allD[i],rt=rd.reduce((a,b)=>a+b,0);h+=`<tr class="dr"><td class="std" style="color:${SC[st]}">${st}</td>${rd.map(v=>`<td><span class="cv" style="background:${hBg(v,mx)};color:${v/mx>.5?'#fff':'var(--text)'}">${v}</span></td>`).join('')}<td style="color:var(--text2);font-weight:500">${rt}</td></tr>`;});const ht=ght(rows),gt=ht.reduce((a,b)=>a+b,0);h+=`<tr class="tr"><td class="std" style="color:var(--text3)">合計</td>${ht.map(v=>`<td>${v}</td>`).join('')}<td>${gt}</td></tr></tbody>`;document.getElementById('heatmap').innerHTML=h;}
function rc(){const rows=fd(),sts=gas();const ht=ght(rows),mx=Math.max(...ht,1);const hl=HOURS.map(h=>`${h}:00`);const gc='rgba(255,255,255,.05)',tc='#555970';if(barC)barC.destroy();barC=new Chart(document.getElementById('barChart'),{type:'bar',data:{labels:hl,datasets:[{data:ht,backgroundColor:ht.map(v=>{const p=v/mx;return p>.66?'rgba(248,113,113,.8)':p>.33?'rgba(245,158,11,.75)':'rgba(108,142,247,.7)';}),borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw} 筆`}}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{display:false}},y:{ticks:{color:tc,font:{size:10}},grid:{color:gc}}}}});if(pieC)pieC.destroy();const st2=STORES.map(st=>({st,v:gsht(st,rows).reduce((a,b)=>a+b,0)}));pieC=new Chart(document.getElementById('pieChart'),{type:'doughnut',data:{labels:st2.map(x=>x.st),datasets:[{data:st2.map(x=>x.v),backgroundColor:STORES.map(s=>SC[s]),borderWidth:2,borderColor:'#171923'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:true,position:'right',labels:{color:tc,font:{size:11},padding:7,boxWidth:9}},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.raw} 筆`}}}}});if(lineC)lineC.destroy();lineC=new Chart(document.getElementById('lineChart'),{type:'line',data:{labels:hl,datasets:sts.map(st=>({label:st,data:gsht(st,rows),borderColor:SC[st],backgroundColor:SC[st]+'22',borderWidth:2,pointRadius:3,tension:.35,fill:false}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:tc,font:{size:11},padding:10,boxWidth:9}},tooltip:{mode:'index',intersect:false}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10}},grid:{color:gc}}}}});}
function rd(){const st=document.getElementById('detSt').value;if(!st)return;const rows=fd().filter(r=>r[0]===st);const hl=HOURS.map(h=>`${h}:00`);let h=`<thead><tr><th>日期</th><th>星期</th>${hl.map(h=>`<th>${h}</th>`).join('')}<th>小計</th></tr></thead><tbody>`;let ct=new Array(HOURS.length).fill(0);rows.forEach(r=>{const wdi=WD_IDX[r[2]],isW=wdi>=5;const vals=HOURS.map((_,i)=>r[3+i]);const rt=vals.reduce((a,b)=>a+b,0);vals.forEach((v,i)=>ct[i]+=v);h+=`<tr class="${isW?'wk':''}"><td>${r[1]}</td><td><span class="wb ${isW?'wk':'wd'}">週${r[2]}</span></td>${vals.map(v=>`<td class="${v?'':'z'}">${v}</td>`).join('')}<td style="font-weight:500;color:var(--text2)">${rt}</td></tr>`;});const gt=ct.reduce((a,b)=>a+b,0);h+=`<tr class="ttr"><td colspan="2">合計</td>${ct.map(v=>`<td>${v}</td>`).join('')}<td style="font-weight:600">${gt}</td></tr></tbody>`;document.getElementById('detTable').innerHTML=h;}
function bf(){const sp=document.getElementById('storePills');[['all','全部'],...STORES.map(s=>[s,s])].forEach(([v,l])=>{const b=document.createElement('button');b.className='pill'+(v==='all'?' on':'');b.textContent=l;b.onclick=()=>{curStore=v;document.querySelectorAll('#storePills .pill').forEach(p=>p.classList.remove('on'));b.classList.add('on');ra();};sp.appendChild(b);});const wp=document.getElementById('wdPills');[['all','全部',false],...WD.map((n,i)=>[String(i),'週'+n,i>=5])].forEach(([v,l,isW])=>{const b=document.createElement('button');b.className='pill'+(v==='all'?' wo':'')+(isW?' wknd':'');if(v==='all')b.style.background='#6c8ef7';b.textContent=l;b.dataset.wd=v;b.onclick=()=>{if(v==='all'){selWd=new Set(['all']);document.querySelectorAll('#wdPills .pill').forEach(p=>{p.classList.remove('wo');p.style.background='';});b.classList.add('wo');b.style.background='#6c8ef7';}else{if(selWd.has('all')){selWd=new Set();const ab=document.querySelector('[data-wd="all"]');ab.classList.remove('wo');ab.style.background='';}if(selWd.has(v)){selWd.delete(v);b.classList.remove('wo');b.style.background='';}else{selWd.add(v);b.classList.add('wo');b.style.background=isW?'#f87171':'#6c8ef7';}if(!selWd.size){selWd=new Set(['all']);const ab=document.querySelector('[data-wd="all"]');ab.classList.add('wo');ab.style.background='#6c8ef7';}}ra();};wp.appendChild(b);});const ds=document.getElementById('detSt');STORES.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;ds.appendChild(o);});ds.addEventListener('change',rd);}
function ra(){rm();rh();rc();rd();}
document.getElementById('periodBadge').textContent='2026/03/01 ～ 2026/03/22';
document.getElementById('fPeriod').textContent='2026/03/01 ～ 2026/03/22';
document.getElementById('fTotal').textContent=RAW.reduce((s,r)=>s+r.slice(3).reduce((a,b)=>a+b,0),0).toLocaleString();
bf();ra();
</script>
